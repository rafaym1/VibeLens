name: Install Test

on:
  pull_request:
    paths:
      - "pyproject.toml"
      - "src/vibelens/__init__.py"
      - "npm/**"
      - ".github/workflows/install-test.yml"
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  pip-install:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Build wheel
        run: uv build

      - name: Install from wheel
        shell: bash
        run: pip install dist/*.whl

      - name: Verify CLI entry point
        run: vibelens version

      - name: Verify importable
        run: python -c "import vibelens; print(vibelens.__version__)"

  uv-tool-install:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build wheel
        run: uv build

      - name: Install via uv tool
        shell: bash
        run: uv tool install dist/*.whl

      - name: Verify CLI entry point
        run: vibelens version

  npm-wrapper:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build and install Python package
        shell: bash
        run: uv build && pip install dist/*.whl

      - name: Verify npm wrapper
        run: node npm/bin/vibelens.js version
